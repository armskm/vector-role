---
dependency:
  name: galaxy
role_name_check: 1
driver:
  name: podman
lint: |
  yamllint .
  ansible-lint .
platforms:
  - name: oraclelinux8
    image: oraclelinux:8
    pre_build_image: true
  - name: ubuntu
    image: jrei/systemd-ubuntu:latest
    pre_build_image: true
provisioner:
  name: ansible
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - destroy