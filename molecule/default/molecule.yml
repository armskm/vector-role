---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  yamllint .
  ansible-lint .
platforms:
  - name: oraclelinux8
    image: oraclelinux:8
    pre_build_image: true
    command: /sbin/init
    privileged: true
  - name: ubuntu
    image: jrei/systemd-ubuntu:latest
    pre_build_image: true
    command: /sbin/init
    privileged: true
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
provisioner:
  name: ansible
verifier:
  name: ansible
  options:
    sudo: true
scenario:
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - destroy
